kind = "web"
previewPath = "/"
title = "The Riddle"
version = "1.0.0"
id = "artifacts/riddle-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25812

[services.development]
run = "pnpm --filter @workspace/riddle-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/riddle-site", "run", "build" ]
publicDir = "artifacts/riddle-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25812"
BASE_PATH = "/"
